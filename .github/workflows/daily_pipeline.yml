name: SoundPulse Daily Pipeline (Prefect Worker)

on:
  # GitHub Actions acts as the Prefect worker — polls for scheduled runs
  # Prefect Cloud schedules at 02:00 UTC; this workflow starts the worker
  schedule:
    - cron: "50 1 * * *"   # start worker at 01:50 UTC, 10 min before Prefect fires
  workflow_dispatch:        # manual trigger from GitHub UI or Prefect Cloud webhook

concurrency:
  group: soundpulse-pipeline
  cancel-in-progress: false

jobs:
  prefect-worker:
    name: "Prefect Worker — SoundPulse Pipeline"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
      PYTHONUNBUFFERED: "1"
      PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 0. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 1. Python 3.11 ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 2. GCP credentials ───────────────────────────────────────────────────
      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      # ── 3. System deps (ffmpeg for librosa/pydub audio processing) ──────────
      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      # ── 4a. Install PyTorch CPU-only first (avoids downloading 2GB GPU build) ─
      - name: Install PyTorch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      # ── 4b. Install all pipeline deps ────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements_pipeline.txt

      # ── 4. dbt profile ───────────────────────────────────────────────────────
      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'PROFILE'
          soundpulse:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: soundpulse-production
                dataset: dbt_transformed
                keyfile: /tmp/gcp-key.json
                threads: 4
                timeout_seconds: 300
                location: US
          PROFILE

      # ── 5. Authenticate Prefect CLI to Prefect Cloud ─────────────────────────
      - name: Prefect Cloud login
        run: |
          prefect config set PREFECT_API_URL="${{ secrets.PREFECT_API_URL }}"
          prefect config set PREFECT_API_KEY="${{ secrets.PREFECT_API_KEY }}"

      # ── 6. Run the Prefect flow directly ─────────────────────────────────────
      #    This executes the full pipeline and reports every task state to
      #    Prefect Cloud — visible at app.prefect.cloud in real time
      - name: Run SoundPulse pipeline via Prefect
        run: python orchestration/prefect_pipeline.py

      # ── 7. Commit refreshed docs/data/ → GitHub Pages auto-updates ───────────
      - name: Commit refreshed data to GitHub Pages
        if: always()   # commit even on partial success
        run: |
          git config user.name  "soundpulse-bot"
          git config user.email "bot@soundpulse"
          git add docs/data/ docs/audio/
          git diff --staged --quiet || git commit -m "chore: daily data refresh [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
