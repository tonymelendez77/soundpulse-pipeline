  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --surface2:  #1a2236;
      --border:    #1e2d45;
      --accent:    #3b82f6;
      --accent2:   #06b6d4;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --badge-live: #10b981;
      --badge-wip:  #f59e0b;
      --radius:    12px;
      --font:      'Inter', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(10,14,26,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-family: var(--mono);
      font-size: .9rem;
      color: var(--accent2);
      letter-spacing: .04em;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: .88rem; font-weight: 500;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    #hero {
      display: flex; align-items: center; justify-content: center;
      padding: 7rem 2rem 3.5rem;
      position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(59,130,246,.10) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 60%, rgba(6,182,212,.08) 0%, transparent 70%);
    }
    .hero-grid {
      position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .25;
    }
    .hero-content {
      position: relative; z-index: 1;
      max-width: 1080px; width: 100%;
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 4rem;
    }
    .hero-text { text-align: left; }
    .hero-eyebrow {
      display: inline-block;
      font-family: var(--mono); font-size: .78rem;
      color: var(--accent2); letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid rgba(6,182,212,.3);
      background: rgba(6,182,212,.06);
      padding: .3rem .8rem; border-radius: 99px;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700; line-height: 1.1;
      letter-spacing: -.02em;
      color: #ffffff;
      margin-bottom: .75rem;
    }
    .hero-title {
      font-size: 1rem; color: var(--accent); font-weight: 500;
      margin-bottom: 1rem;
    }
    .hero-tagline {
      font-size: .98rem; color: var(--muted); max-width: 520px; margin-bottom: 2rem;
    }
    .hero-cta { display: flex; gap: .85rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .65rem 1.35rem; border-radius: 8px;
      font-size: .88rem; font-weight: 600; text-decoration: none;
      transition: all .2s; cursor: pointer; border: none;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    /* ── Hero Photo ── */
    .hero-photo-wrap {
      flex-shrink: 0;
      position: relative;
    }
    .hero-photo-wrap::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      z-index: 0;
    }
    .hero-photo-wrap::after {
      content: '';
      position: absolute; inset: -14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,.18) 0%, transparent 70%);
      z-index: -1;
    }
    .hero-photo {
      width: 200px; height: 200px;
      border-radius: 50%;
      object-fit: cover; object-position: center top;
      display: block;
      position: relative; z-index: 1;
      border: 3px solid var(--bg);
    }
    .hero-photo-placeholder {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: var(--surface2);
      border: 3px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      position: relative; z-index: 1;
    }
    .hero-stats {
      display: flex; gap: 0; margin-top: 1.75rem;
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; width: fit-content;
    }
    .hero-stat {
      display: flex; flex-direction: column; gap: .15rem;
      padding: .75rem 1.25rem;
      border-right: 1px solid var(--border);
    }
    .hero-stat:last-child { border-right: none; }
    .hero-stat-num {
      font-size: 1rem; font-weight: 700;
      color: #ffffff;
    }
    .hero-stat-label { font-size: .75rem; color: var(--muted); }

    /* ── Sections ── */
    section { padding: 6rem 2rem; max-width: 1080px; margin: 0 auto; }
    .section-label {
      font-family: var(--mono); font-size: .78rem;
      color: var(--accent2); letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: .6rem;
    }
    h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700; letter-spacing: -.02em; margin-bottom: 1rem;
    }
    .section-divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; margin-bottom: 2.5rem;
    }

    /* ── About ── */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .about-text { font-size: 1.02rem; color: var(--muted); line-height: 1.85; }
    .about-meta { display: flex; flex-direction: column; gap: 1rem; }
    .meta-item {
      display: flex; align-items: center; gap: .75rem;
      font-size: .9rem; color: var(--muted);
    }
    .meta-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .lang-chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
    .lang-chip {
      display: flex; align-items: center; gap: .4rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: .3rem .75rem; font-size: .82rem;
    }
    .lang-level { color: var(--accent2); font-weight: 500; font-size: .78rem; }

    /* ── Hobbies ── */
    .hobbies-grid { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
    .hobby-chip {
      display: flex; align-items: center; gap: .4rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: .3rem .75rem; font-size: .82rem;
      color: var(--text); transition: border-color .15s;
    }
    .hobby-chip:hover { border-color: var(--accent2); }

    /* ── Skills ── */
    #skills { background: var(--surface); border-radius: var(--radius); padding: 4rem 3rem; max-width: 1080px; margin: 0 auto; }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
    .skill-group h3 {
      font-size: .82rem; font-weight: 600; color: var(--accent);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: .85rem;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: .4rem; }
    .skill-tag {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: .25rem .65rem; font-size: .8rem; font-weight: 500;
      transition: all .15s;
    }
    .skill-tag:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Projects ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(440px, 1fr)); gap: 2rem; }
    .project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      display: flex; flex-direction: column; gap: 1.2rem;
      transition: border-color .2s, transform .2s;
    }
    .project-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .project-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .project-name { font-size: 1.15rem; font-weight: 700; }
    .badge {
      font-size: .72rem; font-weight: 600; padding: .2rem .6rem;
      border-radius: 99px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-live    { background: rgba(16,185,129,.15); color: var(--badge-live); border: 1px solid rgba(16,185,129,.3); }
    .badge-wip     { background: rgba(245,158,11,.12); color: var(--badge-wip);  border: 1px solid rgba(245,158,11,.3); }
    .project-desc  { font-size: .93rem; color: var(--muted); line-height: 1.75; }
    .project-highlights { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
    .project-highlights li {
      font-size: .84rem; color: var(--muted);
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .project-highlights li::before {
      content: "→"; color: var(--accent2); font-size: .8rem;
      margin-top: .1rem; flex-shrink: 0;
    }
    .project-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
    .project-tags  { display: flex; flex-wrap: wrap; gap: .35rem; }
    .project-tag   { font-family: var(--mono); font-size: .72rem; color: var(--accent); background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: 4px; padding: .15rem .5rem; }
    .btn-project   { background: var(--accent); color: #fff; padding: .55rem 1.1rem; border-radius: 7px; font-size: .83rem; font-weight: 600; text-decoration: none; transition: background .2s; white-space: nowrap; }
    .btn-project:hover { background: #2563eb; }
    .btn-project.disabled { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); pointer-events: none; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center; padding: 2.5rem 2rem;
      color: var(--muted); font-size: .85rem;
    }
    footer a { color: var(--accent2); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
      .hero-content { grid-template-columns: 1fr; text-align: center; gap: 2rem; }
      .hero-text { text-align: center; }
      .hero-tagline { margin: 0 auto 2rem; }
      .hero-cta { justify-content: center; }
      .hero-photo-wrap { margin: 0 auto; }
      .hero-photo, .hero-photo-placeholder { width: 160px; height: 160px; }
      .hero-stats { justify-content: center; }
      .about-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      #skills { padding: 2.5rem 1.5rem; }
      section { padding: 4rem 1.25rem; }
    }
  </style>
</head>

      }</div>
    </div>
    <div class="meta-item" style="flex-direction:column;align-items:flex-start;gap:.5rem">
      <div style="display:flex;gap:.5rem;align-items:center"><div class="meta-icon">🎯</div> Hobbies</div>
      <div class="hobbies-grid">${
        PROFILE.hobbies.map(h => `<div class="hobby-chip">${h.icon} ${h.label}</div>`).join("")
      }</div>
    </div>`;

  // Skills
  const sg = document.getElementById("skills-grid");
  for (const [group, tags] of Object.entries(PROFILE.skills)) {
    const div = document.createElement("div");
    div.className = "skill-group";
    div.innerHTML = `<h3>${group}</h3><div class="skill-tags">${
      tags.map(t => `<span class="skill-tag">${t}</span>`).join("")
    }</div>`;
    sg.appendChild(div);
  }

  // Projects
  const pg = document.getElementById("projects-grid");
  PROFILE.projects.forEach(p => {
    const isLive    = p.badge === "Live";
    const badgeCls  = isLive ? "badge-live" : "badge-wip";
    const btnCls    = (p.link && p.link !== "#") ? "btn-project" : "btn-project disabled";
    const card      = document.createElement("div");
    card.className  = "project-card";
    card.innerHTML  = `
      <div class="project-header">
        <div class="project-name">${p.name}</div>
        <span class="badge ${badgeCls}">${p.badge}</span>
      </div>
      <p class="project-desc">${p.description}</p>
      <ul class="project-highlights">${
        p.highlights.map(h => `<li>${h}</li>`).join("")
      }</ul>
      <div class="project-footer">
        <div class="project-tags">${
          p.tags.map(t => `<span class="project-tag">${t}</span>`).join("")
        }</div>
        <a class="${btnCls}" href="${p.link}" target="_blank" rel="noopener">${p.label} ↗</a>
      </div>`;
    pg.appendChild(card);
  });

  // Footer
  document.getElementById("footer-text").innerHTML =
    `© ${new Date().getFullYear()} ${PROFILE.name} &nbsp;·&nbsp;
     <a href="mailto:${PROFILE.email}">${PROFILE.email}</a> &nbsp;·&nbsp;
     <a href="${PROFILE.github}" target="_blank">GitHub</a> &nbsp;·&nbsp;
     <a href="${PROFILE.linkedin}" target="_blank">LinkedIn</a>`;
</script>
</body>
</html>
